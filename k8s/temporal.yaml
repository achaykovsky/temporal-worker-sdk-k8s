# temporalio/auto-setup aligned with temporalio/docker-compose docker-compose-postgres.yml (DB=postgres12, POSTGRES_SEEDS).
# Image tag pinned to match upstream .env TEMPORAL_VERSION at time of manifest authoring.
apiVersion: v1
kind: Service
metadata:
  name: temporal
  namespace: temporal
  labels:
    app.kubernetes.io/name: temporal
spec:
  type: ClusterIP
  ports:
    - name: grpc
      port: 7233
      targetPort: grpc
  selector:
    app.kubernetes.io/name: temporal
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal
  namespace: temporal
  labels:
    app.kubernetes.io/name: temporal
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: temporal
  template:
    metadata:
      labels:
        app.kubernetes.io/name: temporal
    spec:
      containers:
        - name: temporal
          image: temporalio/auto-setup:1.29.1
          imagePullPolicy: IfNotPresent
          ports:
            - name: grpc
              containerPort: 7233
          env:
            - name: DB
              value: postgres12
            - name: DB_PORT
              value: "5432"
            - name: POSTGRES_SEEDS
              value: postgres
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_USER
            - name: POSTGRES_PWD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_PASSWORD
            - name: DYNAMIC_CONFIG_FILE_PATH
              value: config/dynamicconfig/development-sql.yaml
            - name: TEMPORAL_ADDRESS
              value: temporal:7233
            - name: TEMPORAL_CLI_ADDRESS
              value: temporal:7233
          volumeMounts:
            - name: dynamic-config
              mountPath: /etc/temporal/config/dynamicconfig
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 45
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 90
            periodSeconds: 20
      volumes:
        - name: dynamic-config
          configMap:
            name: temporal-dynamic-config
